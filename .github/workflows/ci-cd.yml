name: Android CI/CD

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout project sources
      uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Create dummy secrets.properties and google-services.json for CI
      run: |
        if [ -f "secrets.defaults.properties" ]; then
          cp secrets.defaults.properties secrets.properties
        else
          echo "BASE_URL=https://api.example.com/" > secrets.properties
        fi

        echo '{
          "project_info": {
            "project_number": "1234567890",
            "project_id": "dummy-project"
          },
          "client": [
            {
              "client_info": {
                "mobilesdk_app_id": "1:1234567890:android:1234567890",
                "android_client_info": {
                  "package_name": "com.example.yakallim"
                }
              },
              "api_key": [
                {
                  "current_key": "dummy-api-key"
                }
              ],
              "services": {
                "appinvite_service": {
                  "status": 1
                }
              }
            }
          ],
          "configuration_version": "1"
        }' > app/google-services.json

    - name: Build with Gradle
      run: ./gradlew build --no-daemon

    - name: Generate Job Summary
      if: always()
      run: |
        echo "### Workflow Execution Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Property | Value |" >> $GITHUB_STEP_SUMMARY
        echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
        echo "| **Workflow** | ${{ github.workflow }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Trigger Event** | ${{ github.event_name }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Branch** | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Tests (Executed)** | Yes |" >> $GITHUB_STEP_SUMMARY

  trigger-jenkins:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Jenkins Generic Webhook
        run: >
          curl -X POST "${{ secrets.JENKINS_WEBHOOK_URL }}?token=${{ secrets.JENKINS_TRIGGER_TOKEN }}"
          -H "Content-Type: application/json"
          -d '{"ref": "${{ github.ref }}", "repository": "${{ github.repository }}", "commit": "${{ github.sha }}"}'
